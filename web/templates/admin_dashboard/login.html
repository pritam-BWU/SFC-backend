<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFC Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-5 py-10">
        <section class="w-full max-w-md rounded-xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
            <p class="text-sm font-semibold uppercase tracking-wide text-violet-700">SuperFlow Food Club</p>
            <h1 class="mt-2 text-3xl font-semibold text-slate-950">Admin Login</h1>
            <p class="mt-2 text-sm text-slate-500">Access the club operations dashboard.</p>

            {% if form.non_field_errors %}
                <div class="mt-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                    {{ form.non_field_errors|striptags }}
                </div>
            {% endif %}

            <form method="post" class="mt-7 space-y-5">
                {% csrf_token %}
                <div>
                    <label for="{{ form.username.id_for_label }}" class="mb-2 block text-sm font-medium text-slate-700">Username</label>
                    {{ form.username }}
                </div>
                <div>
                    <label for="{{ form.password.id_for_label }}" class="mb-2 block text-sm font-medium text-slate-700">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="w-full rounded-lg bg-violet-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-violet-700">Login</button>
            </form>

            <div class="mt-6 rounded-lg bg-slate-50 p-4 text-sm text-slate-600">
                <p class="font-medium text-slate-800">Demo admin</p>
                <p class="mt-1">Username: admin</p>
                <p>Password: Admin@123</p>
            </div>
        </section>
    </main>
</body>
</html>
