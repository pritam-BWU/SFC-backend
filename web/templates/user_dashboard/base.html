<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SFC Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
    <div class="min-h-screen md:flex">
        <aside class="bg-slate-950 text-white md:min-h-screen md:w-72">
            <div class="flex items-center justify-between border-b border-white/10 px-5 py-4 md:block">
                <a href="{% url 'dashboard_home' %}" class="block">
                    <span class="text-lg font-semibold tracking-wide">SFC</span>
                    <span class="block text-xs text-slate-400">Member Portal</span>
                </a>
                <form method="post" action="{% url 'dashboard_logout' %}" class="md:hidden">
                    {% csrf_token %}
                    <button type="submit" class="rounded-md bg-white/10 px-3 py-2 text-sm hover:bg-white/20">Logout</button>
                </form>
            </div>
            <nav class="grid grid-cols-3 gap-2 px-3 py-3 md:block md:space-y-2 md:px-4 md:py-6">
                <a href="{% url 'dashboard_home' %}" class="rounded-lg px-3 py-3 text-center text-sm transition hover:bg-white/10 md:block md:text-left {% if request.resolver_match.url_name == 'dashboard_home' %}bg-teal-500 text-white{% else %}text-slate-300{% endif %}">Dashboard</a>
                <a href="{% url 'dashboard_profile' %}" class="rounded-lg px-3 py-3 text-center text-sm transition hover:bg-white/10 md:block md:text-left {% if request.resolver_match.url_name == 'dashboard_profile' %}bg-teal-500 text-white{% else %}text-slate-300{% endif %}">Profile</a>
                <a href="{% url 'dashboard_subscription' %}" class="rounded-lg px-3 py-3 text-center text-sm transition hover:bg-white/10 md:block md:text-left {% if request.resolver_match.url_name == 'dashboard_subscription' %}bg-teal-500 text-white{% else %}text-slate-300{% endif %}">Subscription</a>
            </nav>
            <form method="post" action="{% url 'dashboard_logout' %}" class="hidden px-4 md:block">
                {% csrf_token %}
                <button type="submit" class="w-full rounded-lg border border-white/10 px-4 py-3 text-left text-sm text-slate-300 transition hover:bg-white/10 hover:text-white">Logout</button>
            </form>
        </aside>

        <main class="flex-1">
            <header class="border-b border-slate-200 bg-white px-5 py-4 md:px-8">
                <div class="flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wide text-teal-700">User Dashboard</p>
                        <h1 class="text-xl font-semibold text-slate-950 md:text-2xl">{% block page_title %}Dashboard{% endblock %}</h1>
                    </div>
                    <div class="rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-600">
                        {{ request.user.username }}
                    </div>
                </div>
            </header>
            <section class="px-5 py-6 md:px-8">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
</body>
</html>
